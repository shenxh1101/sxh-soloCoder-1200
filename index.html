<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太阳系仪 - Three.js 天文可视化工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            font-family: 'Microsoft YaHei', sans-serif;
            background: #000;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        .label {
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            padding: 4px 10px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            white-space: nowrap;
            pointer-events: none;
            text-shadow: 0 0 4px rgba(0, 0, 0, 0.8);
        }
        .label-sun {
            color: #ffd700;
            border-color: rgba(255, 215, 0, 0.5);
        }
        .label-earth {
            color: #4fc3f7;
            border-color: rgba(79, 195, 247, 0.5);
        }
        .label-moon {
            color: #bdbdbd;
            border-color: rgba(189, 189, 189, 0.5);
        }
        #info-panel {
            position: absolute;
            top: 16px;
            left: 16px;
            color: #fff;
            background: rgba(0, 0, 0, 0.65);
            padding: 14px 18px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 100;
            font-size: 14px;
            min-width: 260px;
        }
        #info-panel h3 {
            margin-bottom: 10px;
            color: #ffd700;
            font-size: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            padding-bottom: 6px;
        }
        #info-panel .info-row {
            margin: 6px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #info-panel .info-label {
            color: #aaa;
        }
        #info-panel .info-value {
            color: #4fc3f7;
            font-weight: bold;
        }
        #info-panel .info-value.warn {
            color: #ffb74d;
        }
        #info-panel .info-section {
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px dashed rgba(255, 255, 255, 0.1);
        }
        #info-panel .info-section:first-of-type {
            border-top: none;
            margin-top: 0;
            padding-top: 0;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 20px;
            z-index: 200;
        }
        .lil-gui {
            --width: 280px;
            --widget-height: 24px;
            --name-width: 45%;
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="canvas-container">
        <div id="loading">正在加载太阳系仪...</div>
        <div id="info-panel">
            <h3>🌞 太阳系信息</h3>
            <div class="info-section">
                <div class="info-row">
                    <span class="info-label">模拟日期：</span>
                    <span class="info-value" id="sim-date">--</span>
                </div>
                <div class="info-row">
                    <span class="info-label">模拟时间：</span>
                    <span class="info-value" id="sim-time">--</span>
                </div>
                <div class="info-row">
                    <span class="info-label">运行状态：</span>
                    <span class="info-value warn" id="sim-status">运行中</span>
                </div>
                <div class="info-row">
                    <span class="info-label">时间倍率：</span>
                    <span class="info-value" id="sim-timescale">×1.0</span>
                </div>
            </div>
            <div class="info-section">
                <div class="info-row">
                    <span class="info-label">当前目标：</span>
                    <span class="info-value" id="current-target">太阳</span>
                </div>
                <div class="info-row">
                    <span class="info-label">地球公转角度：</span>
                    <span class="info-value" id="earth-angle">0°</span>
                </div>
                <div class="info-row">
                    <span class="info-label">月球公转角度：</span>
                    <span class="info-value" id="moon-angle">0°</span>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

        // ============ 全局变量 ============
        let scene, camera, renderer, labelRenderer, controls;
        let sun;
        let earthPivot, earthAnchor, earthTilt, earthMesh;
        let moonPivot, moonMesh;
        let earthOrbitLine, moonOrbitLine;
        let stars;
        let clock;
        let earthTextureLoaded = false;

        // ============ 时间系统 ============
        // 单一时间源：simDays 表示从 startDate 经过的模拟天数
        let simDays = 0;
        let isPaused = false;

        // 天文常数（真实比例简化版）
        const ASTRONOMY = {
            earthOrbitalPeriod: 365.256,
            moonOrbitalPeriod: 27.322,
            earthRotationPeriod: 1.0,
            sunRotationPeriod: 25.38,
            earthAxialTilt: 23.44 * Math.PI / 180,
            moonTidalLock: true,
            startDate: new Date('2026-01-01T00:00:00')
        };

        // 场景配置
        const SCENE_CONFIG = {
            earthOrbitRadius: 30,
            moonOrbitRadius: 5,
            sunSize: 5,
            earthSize: 1.5,
            moonSize: 0.5,
            showOrbits: true,
            showLabels: true
        };

        // 时间控制参数
        const TIME_CONFIG = {
            baseDaysPerSecond: 5.0,
            timeScale: 1.0,
            minTimeScale: 0.01,
            maxTimeScale: 100.0
        };

        // 视角控制参数
        const VIEW_CONFIG = {
            followTarget: 'sun',
        };

        // ============ GUI参数对象 ============
        const guiParams = {
            timeScale: TIME_CONFIG.timeScale,
            isPaused: false,
            stepDay: function() { stepSimulation(1); },
            stepWeek: function() { stepSimulation(7); },
            stepMonth: function() { stepSimulation(30); },
            stepYear: function() { stepSimulation(365); },
            followTarget: 'sun',
            showOrbits: SCENE_CONFIG.showOrbits,
            showLabels: SCENE_CONFIG.showLabels,
            jumpDate: '2026-01-01',
            doJumpDate: function() { jumpToDate(guiParams.jumpDate); },
            resetView: function() { resetCameraView(); }
        };

        // ============ 初始化 ============
        function init() {
            // 场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000011);

            // 相机
            camera = new THREE.PerspectiveCamera(
                60,
                window.innerWidth / window.innerHeight,
                0.1,
                2000
            );
            camera.position.set(0, 40, 70);

            // 渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 标签渲染器
            labelRenderer = new CSS2DRenderer();
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.domElement.style.position = 'absolute';
            labelRenderer.domElement.style.top = '0';
            labelRenderer.domElement.style.pointerEvents = 'none';
            document.getElementById('canvas-container').appendChild(labelRenderer.domElement);

            // 控制器
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.08;
            controls.minDistance = 3;
            controls.maxDistance = 300;
            controls.target.set(0, 0, 0);

            // 时钟
            clock = new THREE.Clock();

            // 创建场景内容
            createSun();
            createLights();
            createEarthSystem();
            createMoonSystem();
            createOrbitLines();
            createStars();
            createLabels();
            createGUI();

            // 初始化模拟日期
            guiParams.jumpDate = formatDateForInput(ASTRONOMY.startDate);

            // 事件监听
            window.addEventListener('resize', onWindowResize);

            // 隐藏加载提示
            setTimeout(() => {
                const loading = document.getElementById('loading');
                if (loading) loading.style.display = 'none';
            }, 500);

            // 开始渲染
            animate();
        }

        // ============ 创建光源 ============
        function createLights() {
            const ambientLight = new THREE.AmbientLight(0x404040, 0.4);
            scene.add(ambientLight);

            const sunLight = new THREE.PointLight(0xffdd44, 2.5, 300, 0.5);
            sunLight.position.set(0, 0, 0);
            sunLight.castShadow = true;
            sunLight.shadow.mapSize.width = 2048;
            sunLight.shadow.mapSize.height = 2048;
            scene.add(sunLight);

            sun.userData.light = sunLight;
        }

        // ============ 创建太阳 ============
        function createSun() {
            const geometry = new THREE.SphereGeometry(SCENE_CONFIG.sunSize, 64, 64);
            const material = new THREE.MeshBasicMaterial({
                color: 0xffcc00,
            });
            sun = new THREE.Mesh(geometry, material);
            sun.userData.type = 'sun';

            const glowGeometry = new THREE.SphereGeometry(SCENE_CONFIG.sunSize * 1.2, 32, 32);
            const glowMaterial = new THREE.MeshBasicMaterial({
                color: 0xffaa00,
                transparent: true,
                opacity: 0.3,
                side: THREE.BackSide
            });
            const glow = new THREE.Mesh(glowGeometry, glowMaterial);
            sun.add(glow);

            scene.add(sun);
        }

        // ============ 创建地球系统（正确层级） ============
        // 层级结构：
        // earthPivot (公转：Y轴旋转 = 地球公转角度)
        //   └── earthAnchor (位置偏移：轨道半径处，无自转)
        //       ├── moonOrbitLine (月球轨道线)
        //       ├── moonPivot (月球公转枢轴)
        //       │   └── moonMesh (月球)
        //       └── earthTilt (地轴倾斜组)
        //           └── earthMesh (地球，自转)
        function createEarthSystem() {
            // 公转枢轴（位于太阳中心）
            earthPivot = new THREE.Object3D();
            earthPivot.userData.type = 'earthPivot';
            scene.add(earthPivot);

            // 地球锚点（在轨道半径位置，自身不旋转）
            earthAnchor = new THREE.Object3D();
            earthAnchor.position.set(SCENE_CONFIG.earthOrbitRadius, 0, 0);
            earthAnchor.userData.type = 'earthAnchor';
            earthPivot.add(earthAnchor);

            // 地轴倾斜组
            earthTilt = new THREE.Object3D();
            earthTilt.rotation.z = ASTRONOMY.earthAxialTilt;
            earthTilt.userData.type = 'earthTilt';
            earthAnchor.add(earthTilt);

            // 地球本体（自转）
            const geometry = new THREE.SphereGeometry(SCENE_CONFIG.earthSize, 64, 64);
            const defaultMaterial = new THREE.MeshPhongMaterial({
                color: 0x2266aa,
                specular: new THREE.Color(0x333333),
                shininess: 15
            });

            earthMesh = new THREE.Mesh(geometry, defaultMaterial);
            earthMesh.castShadow = true;
            earthMesh.receiveShadow = true;
            earthMesh.userData.type = 'earth';
            earthTilt.add(earthMesh);

            // 加载地球贴图
            const textureLoader = new THREE.TextureLoader();
            textureLoader.load(
                'https://unpkg.com/three-globe@2.31.0/example/img/earth-blue-marble.jpg',
                (texture) => {
                    texture.colorSpace = THREE.SRGBColorSpace;
                    const material = new THREE.MeshPhongMaterial({
                        map: texture,
                        specular: new THREE.Color(0x333333),
                        shininess: 15
                    });
                    earthMesh.material = material;
                    earthTextureLoaded = true;
                },
                undefined,
                () => {
                    console.log('地球贴图加载失败，使用默认材质');
                }
            );
        }

        // ============ 创建月球系统 ============
        function createMoonSystem() {
            // 月球公转枢轴（挂载在 earthAnchor 上，不受地球自转影响）
            moonPivot = new THREE.Object3D();
            moonPivot.userData.type = 'moonPivot';
            earthAnchor.add(moonPivot);

            // 程序化生成月球凹凸贴图
            const bumpCanvas = document.createElement('canvas');
            bumpCanvas.width = 256;
            bumpCanvas.height = 128;
            const bumpCtx = bumpCanvas.getContext('2d');

            for (let i = 0; i < 800; i++) {
                const x = Math.random() * 256;
                const y = Math.random() * 128;
                const r = Math.random() * 6 + 1;
                const shade = Math.floor(Math.random() * 70 + 90);
                bumpCtx.fillStyle = `rgb(${shade}, ${shade}, ${shade})`;
                bumpCtx.beginPath();
                bumpCtx.arc(x, y, r, 0, Math.PI * 2);
                bumpCtx.fill();
            }

            const bumpTexture = new THREE.CanvasTexture(bumpCanvas);

            const geometry = new THREE.SphereGeometry(SCENE_CONFIG.moonSize, 32, 32);
            const material = new THREE.MeshPhongMaterial({
                color: 0xaaaaaa,
                bumpMap: bumpTexture,
                bumpScale: 0.05,
                shininess: 5
            });

            moonMesh = new THREE.Mesh(geometry, material);
            moonMesh.castShadow = true;
            moonMesh.receiveShadow = true;
            moonMesh.position.set(SCENE_CONFIG.moonOrbitRadius, 0, 0);
            moonMesh.userData.type = 'moon';
            moonPivot.add(moonMesh);
        }

        // ============ 创建轨道线 ============
        function createOrbitLines() {
            // 地球轨道（在场景根节点，以太阳为中心）
            const earthOrbitPoints = [];
            const earthSegments = 128;
            for (let i = 0; i <= earthSegments; i++) {
                const theta = (i / earthSegments) * Math.PI * 2;
                earthOrbitPoints.push(new THREE.Vector3(
                    Math.cos(theta) * SCENE_CONFIG.earthOrbitRadius,
                    0,
                    Math.sin(theta) * SCENE_CONFIG.earthOrbitRadius
                ));
            }
            const earthOrbitGeometry = new THREE.BufferGeometry().setFromPoints(earthOrbitPoints);
            const earthOrbitMaterial = new THREE.LineBasicMaterial({
                color: 0x4fc3f7,
                transparent: true,
                opacity: 0.5
            });
            earthOrbitLine = new THREE.LineLoop(earthOrbitGeometry, earthOrbitMaterial);
            earthOrbitLine.userData.type = 'earthOrbit';
            scene.add(earthOrbitLine);

            // 月球轨道（挂载在 earthAnchor 上，以地球为中心，不受地球自转影响）
            const moonOrbitPoints = [];
            const moonSegments = 64;
            for (let i = 0; i <= moonSegments; i++) {
                const theta = (i / moonSegments) * Math.PI * 2;
                moonOrbitPoints.push(new THREE.Vector3(
                    Math.cos(theta) * SCENE_CONFIG.moonOrbitRadius,
                    0,
                    Math.sin(theta) * SCENE_CONFIG.moonOrbitRadius
                ));
            }
            const moonOrbitGeometry = new THREE.BufferGeometry().setFromPoints(moonOrbitPoints);
            const moonOrbitMaterial = new THREE.LineBasicMaterial({
                color: 0xbdbdbd,
                transparent: true,
                opacity: 0.5
            });
            moonOrbitLine = new THREE.LineLoop(moonOrbitGeometry, moonOrbitMaterial);
            moonOrbitLine.userData.type = 'moonOrbit';
            earthAnchor.add(moonOrbitLine);
        }

        // ============ 创建星空 ============
        function createStars() {
            const starsGeometry = new THREE.BufferGeometry();
            const starCount = 5000;
            const positions = new Float32Array(starCount * 3);
            const colors = new Float32Array(starCount * 3);
            const sizes = new Float32Array(starCount);

            const colorPalette = [
                new THREE.Color(0xffffff),
                new THREE.Color(0xfff4e8),
                new THREE.Color(0xe0f0ff),
                new THREE.Color(0xfff0d0),
                new THREE.Color(0xf0f0ff)
            ];

            for (let i = 0; i < starCount; i++) {
                const radius = 500 + Math.random() * 500;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);

                positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
                positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                positions[i * 3 + 2] = radius * Math.cos(phi);

                const color = colorPalette[Math.floor(Math.random() * colorPalette.length)];
                colors[i * 3] = color.r;
                colors[i * 3 + 1] = color.g;
                colors[i * 3 + 2] = color.b;

                sizes[i] = Math.random() * 2 + 0.5;
            }

            starsGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            starsGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            starsGeometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

            const starsMaterial = new THREE.PointsMaterial({
                size: 1.5,
                vertexColors: true,
                transparent: true,
                opacity: 0.9,
                sizeAttenuation: true
            });

            stars = new THREE.Points(starsGeometry, starsMaterial);
            scene.add(stars);
        }

        // ============ 创建标签 ============
        function createLabels() {
            // 太阳标签
            const sunLabelDiv = document.createElement('div');
            sunLabelDiv.className = 'label label-sun';
            sunLabelDiv.textContent = '☀ 太阳';
            const sunLabel = new CSS2DObject(sunLabelDiv);
            sunLabel.position.set(0, SCENE_CONFIG.sunSize + 2, 0);
            sun.add(sunLabel);
            sun.userData.label = sunLabel;

            // 地球标签（挂在地球本体上，随地球公转但不随自转——CSS2DObject本身会面向相机）
            const earthLabelDiv = document.createElement('div');
            earthLabelDiv.className = 'label label-earth';
            earthLabelDiv.textContent = '🌍 地球';
            const earthLabel = new CSS2DObject(earthLabelDiv);
            earthLabel.position.set(0, SCENE_CONFIG.earthSize + 1.5, 0);
            earthMesh.add(earthLabel);
            earthMesh.userData.label = earthLabel;

            // 月球标签
            const moonLabelDiv = document.createElement('div');
            moonLabelDiv.className = 'label label-moon';
            moonLabelDiv.textContent = '🌙 月球';
            const moonLabel = new CSS2DObject(moonLabelDiv);
            moonLabel.position.set(0, SCENE_CONFIG.moonSize + 0.8, 0);
            moonMesh.add(moonLabel);
            moonMesh.userData.label = moonLabel;
        }

        // ============ 创建GUI面板 ============
        function createGUI() {
            const gui = new GUI({ title: '🎛️ 控制面板' });
            gui.domElement.style.position = 'absolute';
            gui.domElement.style.top = '16px';
            gui.domElement.style.right = '16px';
            gui.domElement.style.zIndex = '100';

            // 时间控制分组
            const timeFolder = gui.addFolder('⏱️ 时间控制');
            timeFolder.open();

            timeFolder.add(guiParams, 'isPaused')
                .name('暂停 / 继续')
                .onChange((v) => {
                    isPaused = v;
                    updateStatusDisplay();
                });

            timeFolder.add(guiParams, 'timeScale', TIME_CONFIG.minTimeScale, TIME_CONFIG.maxTimeScale, 0.01)
                .name('时间倍率')
                .onChange((v) => {
                    TIME_CONFIG.timeScale = v;
                    updateStatusDisplay();
                })
                .listen();

            timeFolder.add(guiParams, 'stepDay')
                .name('⏭ 推进 1 天');

            timeFolder.add(guiParams, 'stepWeek')
                .name('⏭ 推进 7 天');

            timeFolder.add(guiParams, 'stepMonth')
                .name('⏭ 推进 30 天');

            timeFolder.add(guiParams, 'stepYear')
                .name('⏭ 推进 1 年');

            // 视角控制分组
            const viewFolder = gui.addFolder('👁️ 视角控制');
            viewFolder.open();

            viewFolder.add(guiParams, 'followTarget', { '太阳': 'sun', '地球': 'earth', '月球': 'moon' })
                .name('跟随目标')
                .onChange((v) => {
                    VIEW_CONFIG.followTarget = v;
                    updateTargetDisplay();
                    resetCameraView();
                });

            viewFolder.add(guiParams, 'resetView')
                .name('🔄 重置视角');

            // 显示控制分组
            const displayFolder = gui.addFolder('📊 显示控制');
            displayFolder.open();

            displayFolder.add(guiParams, 'showOrbits')
                .name('显示轨道线')
                .onChange((v) => {
                    SCENE_CONFIG.showOrbits = v;
                    earthOrbitLine.visible = v;
                    moonOrbitLine.visible = v;
                });

            displayFolder.add(guiParams, 'showLabels')
                .name('显示天体标签')
                .onChange((v) => {
                    SCENE_CONFIG.showLabels = v;
                    sun.userData.label.visible = v;
                    earthMesh.userData.label.visible = v;
                    moonMesh.userData.label.visible = v;
                });

            // 日期跳转分组
            const dateFolder = gui.addFolder('📅 日期跳转');
            dateFolder.open();

            dateFolder.add(guiParams, 'jumpDate')
                .name('目标日期')
                .onChange((v) => {
                    // 输入时验证格式
                });

            dateFolder.add(guiParams, 'doJumpDate')
                .name('� 跳转到该日期');
        }

        // ============ 时间步进 ============
        function stepSimulation(days) {
            simDays += days;
            updateFromSimDays();
        }

        // ============ 跳转到指定日期 ============
        function jumpToDate(dateStr) {
            const targetDate = new Date(dateStr + 'T00:00:00');
            if (isNaN(targetDate.getTime())) {
                alert('日期格式不正确，请使用 YYYY-MM-DD 格式');
                return;
            }

            const diffMs = targetDate.getTime() - ASTRONOMY.startDate.getTime();
            const diffDays = diffMs / (1000 * 60 * 60 * 24);
            simDays = diffDays;
            updateFromSimDays();
        }

        // ============ 根据 simDays 更新所有天体位置 ============
        // 单一时间源驱动所有运动，确保比例稳定
        function updateFromSimDays() {
            // 太阳自转
            const sunRotationAngle = (simDays / ASTRONOMY.sunRotationPeriod) * Math.PI * 2;
            sun.rotation.y = sunRotationAngle;

            // 地球公转角度
            const earthOrbitAngle = (simDays / ASTRONOMY.earthOrbitalPeriod) * Math.PI * 2;
            earthPivot.rotation.y = earthOrbitAngle;

            // 地球自转角度（相对公转的独立自转）
            const earthRotationAngle = (simDays / ASTRONOMY.earthRotationPeriod) * Math.PI * 2;
            // 由于公转本身会带来一天，所以恒星日比太阳日稍短
            // 这里简化处理：直接用 simDays × 2π 作为地球自转
            earthMesh.rotation.y = earthRotationAngle;

            // 月球公转角度
            const moonOrbitAngle = (simDays / ASTRONOMY.moonOrbitalPeriod) * Math.PI * 2;
            moonPivot.rotation.y = moonOrbitAngle;

            // 月球自转（潮汐锁定：自转周期 = 公转周期）
            if (ASTRONOMY.moonTidalLock) {
                moonMesh.rotation.y = moonOrbitAngle;
            }

            // 更新信息面板
            updateInfoPanel(earthOrbitAngle, moonOrbitAngle);
        }

        // ============ 获取目标天体的世界坐标 ============
        function getTargetWorldPosition(targetName) {
            const _v = new THREE.Vector3();
            switch (targetName) {
                case 'sun':
                    sun.getWorldPosition(_v);
                    break;
                case 'earth':
                    earthMesh.getWorldPosition(_v);
                    break;
                case 'moon':
                    moonMesh.getWorldPosition(_v);
                    break;
                default:
                    _v.set(0, 0, 0);
            }
            return _v;
        }

        // ============ 更新相机跟随目标 ============
        function updateCameraTarget() {
            const targetPos = getTargetWorldPosition(VIEW_CONFIG.followTarget);

            // 使用平滑插值
            controls.target.lerp(targetPos, 0.1);
        }

        // ============ 重置相机视角 ============
        function resetCameraView() {
            const targetPos = getTargetWorldPosition(VIEW_CONFIG.followTarget).clone();

            // 根据目标确定合适的观察距离
            let viewDistance;
            let viewHeight;
            switch (VIEW_CONFIG.followTarget) {
                case 'sun':
                    viewDistance = 70;
                    viewHeight = 40;
                    break;
                case 'earth':
                    viewDistance = 15;
                    viewHeight = 8;
                    break;
                case 'moon':
                    viewDistance = 5;
                    viewHeight = 2.5;
                    break;
                default:
                    viewDistance = 70;
                    viewHeight = 40;
            }

            const endPos = new THREE.Vector3(
                targetPos.x,
                targetPos.y + viewHeight,
                targetPos.z + viewDistance
            );

            const duration = 800;
            const startTime = performance.now();
            const initialPos = camera.position.clone();
            const initialTarget = controls.target.clone();
            const endTarget = targetPos.clone();

            function animateCamera() {
                const elapsed = performance.now() - startTime;
                const t = Math.min(elapsed / duration, 1);
                const easeT = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

                camera.position.lerpVectors(initialPos, endPos, easeT);
                controls.target.lerpVectors(initialTarget, endTarget, easeT);
                controls.update();

                if (t < 1) {
                    requestAnimationFrame(animateCamera);
                }
            }
            animateCamera();
        }

        // ============ 更新信息面板 ============
        function updateInfoPanel(earthOrbitAngle, moonOrbitAngle) {
            // 计算模拟日期
            const simDate = new Date(ASTRONOMY.startDate.getTime());
            simDate.setTime(simDate.getTime() + simDays * 24 * 60 * 60 * 1000);

            const year = simDate.getFullYear();
            const month = String(simDate.getMonth() + 1).padStart(2, '0');
            const day = String(simDate.getDate()).padStart(2, '0');
            const hours = String(simDate.getHours()).padStart(2, '0');
            const minutes = String(simDate.getMinutes()).padStart(2, '0');
            const seconds = String(simDate.getSeconds()).padStart(2, '0');

            document.getElementById('sim-date').textContent = `${year}-${month}-${day}`;
            document.getElementById('sim-time').textContent = `${hours}:${minutes}:${seconds}`;

            const earthDeg = ((earthOrbitAngle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2) * 180 / Math.PI;
            const moonDeg = ((moonOrbitAngle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2) * 180 / Math.PI;

            document.getElementById('earth-angle').textContent = earthDeg.toFixed(1) + '°';
            document.getElementById('moon-angle').textContent = moonDeg.toFixed(1) + '°';
        }

        // ============ 更新状态显示 ============
        function updateStatusDisplay() {
            const statusEl = document.getElementById('sim-status');
            const timescaleEl = document.getElementById('sim-timescale');

            if (isPaused) {
                statusEl.textContent = '已暂停';
                statusEl.className = 'info-value warn';
            } else {
                statusEl.textContent = '运行中';
                statusEl.className = 'info-value';
            }

            timescaleEl.textContent = '×' + TIME_CONFIG.timeScale.toFixed(2);
        }

        // ============ 更新当前目标显示 ============
        function updateTargetDisplay() {
            const targetNames = { 'sun': '太阳', 'earth': '地球', 'moon': '月球' };
            document.getElementById('current-target').textContent = targetNames[VIEW_CONFIG.followTarget] || '—';
        }

        // ============ 格式化日期为 input 格式 ============
        function formatDateForInput(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // ============ 窗口调整 ============
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }

        // ============ 动画循环 ============
        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();

            // 更新模拟时间
            if (!isPaused) {
                const daysDelta = delta * TIME_CONFIG.baseDaysPerSecond * TIME_CONFIG.timeScale;
                simDays += daysDelta;
            }

            // 根据模拟时间更新所有天体
            updateFromSimDays();

            // 更新相机跟随目标
            updateCameraTarget();

            // 星空缓慢旋转
            stars.rotation.y += delta * 0.005;

            // 更新控制器
            controls.update();

            // 渲染
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }

        // ============ 启动 ============
        init();
        updateStatusDisplay();
        updateTargetDisplay();
    </script>
</body>
</html>
